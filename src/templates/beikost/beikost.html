{% extends "layout.html" %}
{% block content %}
<div class="page-header">
    <h1><svg class="icon" style="color:var(--success)"><use href="#icon-apple"/></svg> Beikost</h1>
    <button class="btn" onclick="openModal('modal-beikost')"><svg class="icon"><use href="#icon-plus"/></svg> Eintrag</button>
</div>

<div class="tab-bar">
    <button class="tab-btn active" onclick="showBTab('verlauf',this)">Verlauf</button>
    <button class="tab-btn" onclick="showBTab('lebensmittel',this)">Lebensmittel</button>
</div>

<div id="btab-verlauf" class="tab-content active"><div id="verlauf-list" class="timeline"></div></div>
<div id="btab-lebensmittel" class="tab-content"><div id="lm-list"></div></div>

<div class="modal-overlay" id="modal-beikost">
    <div class="modal-content modal-sm">
        <div class="modal-header"><h2 id="beikost-modal-title">Beikost erfassen</h2><button class="modal-close" onclick="closeModal('modal-beikost')">&times;</button></div>
        <div class="modal-body">
            <input type="hidden" id="b-id">
            <div class="form-group"><label>Lebensmittel</label><input type="text" class="form-control" id="b-lm" placeholder="z.B. Karotte"></div>
            <div class="form-group"><label>Kategorie</label><select class="form-control" id="b-kat"><option value="gemuese">Gemüse</option><option value="obst">Obst</option><option value="getreide">Getreide</option><option value="protein">Protein</option><option value="milch">Milchprodukt</option><option value="sonstiges">Sonstiges</option></select></div>
            <div class="form-group"><label>Akzeptanz (1-5)</label><input type="range" min="1" max="5" value="3" id="b-akz" class="form-control" style="padding:0;"><div class="d-flex justify-between text-xs text-muted"><span>Mag nicht</span><span>Liebt es</span></div></div>
            <div class="form-group"><label><input type="checkbox" id="b-allergie"> Allergieverdacht</label></div>
            <div class="form-group"><label>Reaktion</label><textarea class="form-control" id="b-reaktion" rows="2" placeholder="Reaktion / Verträglichkeit"></textarea></div>
            <div class="form-group"><label><input type="checkbox" id="b-4tage"> 4-Tage-Test starten</label></div>
        </div>
        <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('modal-beikost')">Abbrechen</button><button class="btn btn-primary" onclick="saveBeikost()">Speichern</button></div>
    </div>
</div>

<script>
// KIND_ID kommt aus layout.html (global)

function showBTab(id,btn) { document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.getElementById('btab-'+id).classList.add('active'); btn.classList.add('active'); }

async function loadData() {
    if (!KIND_ID) return;
    const data = await api(`/beikost/api/list/${KIND_ID}`);
    const c = document.getElementById('verlauf-list');
    if (!data.length) { c.innerHTML='<p class="empty-text">Noch keine Beikost eingeführt</p>'; return; }
    window._beikostDaten = data;
    c.innerHTML = data.map(e=>`<div class="timeline-item ${e.allergie_verdacht?'':''}">
        <div class="timeline-time">${formatDate(e.datum)}</div>
        <div class="timeline-content">
            <div class="timeline-type">${esc(e.lebensmittel)} ${e.allergie_verdacht?'<span class="badge badge-danger">Allergie!</span>':''}</div>
            <div class="timeline-detail">${esc(e.kategorie||'')} ${e.akzeptanz?'- Akzeptanz: '+e.akzeptanz+'/5':''}${e.vier_tage_test_ok===true?' - 4-Tage OK':e.vier_tage_test_ok===false?' - 4-Tage NICHT OK':''}</div>
            ${e.reaktion?`<div class="timeline-detail">${esc(e.reaktion)}</div>`:''}
        </div>
        <div class="timeline-actions">
            <button class="btn btn-outline btn-sm btn-icon" onclick="editB(${e.id})"><svg class="icon"><use href="#icon-edit"/></svg></button>
            <button class="btn btn-outline btn-sm btn-icon" onclick="delB(${e.id})"><svg class="icon"><use href="#icon-trash"/></svg></button>
        </div>
    </div>`).join('');

    // Lebensmittel-Übersicht
    const lm = await api(`/beikost/api/lebensmittel/${KIND_ID}`);
    document.getElementById('lm-list').innerHTML = !lm.length ? '<p class="empty-text">Keine Lebensmittel</p>' :
        '<div class="stat-grid">'+lm.map(l=>`<div class="stat-card" style="text-align:left;${l.allergie?'border-color:var(--danger);':''}">
            <div class="fw-bold">${esc(l.name)} ${l.allergie?'<span class="badge badge-danger">Allergie</span>':''}</div>
            <div class="text-sm text-muted">${esc(l.kategorie||'')} - ${l.count}x gegeben</div>
            ${l.letzte_akzeptanz?`<div class="text-xs">Akzeptanz: ${l.letzte_akzeptanz}/5</div>`:''}
            ${l.vier_tage_ok===true?'<span class="badge badge-success">4-Tage OK</span>':l.vier_tage_ok===false?'<span class="badge badge-danger">4-Tage Reaktion</span>':''}
        </div>`).join('')+'</div>';
}

function editB(id) {
    const e = window._beikostDaten.find(x => x.id === id);
    if (!e) return;
    document.getElementById('b-id').value = e.id;
    document.getElementById('beikost-modal-title').textContent = 'Beikost bearbeiten';
    document.getElementById('b-lm').value = e.lebensmittel || '';
    document.getElementById('b-kat').value = e.kategorie || 'gemuese';
    document.getElementById('b-akz').value = e.akzeptanz || 3;
    document.getElementById('b-allergie').checked = e.allergie_verdacht || false;
    document.getElementById('b-reaktion').value = e.reaktion || '';
    openModal('modal-beikost');
}

async function saveBeikost() {
    const id = document.getElementById('b-id').value;
    const body = {
        kind_id: KIND_ID,
        lebensmittel: document.getElementById('b-lm').value,
        kategorie: document.getElementById('b-kat').value,
        akzeptanz: parseInt(document.getElementById('b-akz').value),
        allergie_verdacht: document.getElementById('b-allergie').checked,
        reaktion: document.getElementById('b-reaktion').value,
        vier_tage_test_start: document.getElementById('b-4tage').checked ? new Date().toISOString().split('T')[0] : null,
    };
    try {
        if (id) { await api(`/beikost/api/update/${id}`, {method:'PUT', body}); }
        else { await api('/beikost/api/create', {method:'POST', body}); }
        document.getElementById('b-id').value = '';
        document.getElementById('beikost-modal-title').textContent = 'Beikost erfassen';
        closeModal('modal-beikost');
        showToast('Gespeichert', 'success');
        loadData();
    } catch(e) { showToast(e.message, 'error'); }
}

async function delB(id) { if (!await confirm('Löschen?',{danger:true})) return; await api(`/beikost/api/delete/${id}`,{method:'DELETE'}); showToast('Gelöscht'); loadData(); }

loadData();
</script>
{% endblock %}
