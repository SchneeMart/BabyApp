{% extends "layout.html" %}
{% block content %}
<div class="page-header">
    <h1><svg class="icon" style="color:var(--accent)"><use href="#icon-book"/></svg> Tagebuch</h1>
    <button class="btn" onclick="openModal('modal-tagebuch')"><svg class="icon"><use href="#icon-plus"/></svg> Eintrag</button>
</div>

<div id="tagebuch-list"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal-tagebuch">
    <div class="modal-content">
        <div class="modal-header"><h2 id="tb-modal-title">Tagebucheintrag</h2><button class="modal-close" onclick="closeModal('modal-tagebuch')">&times;</button></div>
        <div class="modal-body">
            <input type="hidden" id="t-id">
            <div class="form-row">
                <div class="form-group"><label>Datum</label><input type="date" class="form-control" id="t-datum"></div>
                <div class="form-group"><label>Stimmung</label>
                    <div class="d-flex gap-1" id="t-stimmung-btns">
                        <button type="button" class="btn btn-outline btn-sm" onclick="setStimmung(1)">1</button>
                        <button type="button" class="btn btn-outline btn-sm" onclick="setStimmung(2)">2</button>
                        <button type="button" class="btn btn-outline btn-sm" onclick="setStimmung(3)">3</button>
                        <button type="button" class="btn btn-outline btn-sm" onclick="setStimmung(4)">4</button>
                        <button type="button" class="btn btn-outline btn-sm" onclick="setStimmung(5)">5</button>
                    </div>
                </div>
            </div>
            <div class="form-group"><label>Titel</label><input type="text" class="form-control" id="t-titel" placeholder="Was war heute besonders?"></div>
            <div class="form-group"><label>Text</label><textarea class="form-control" id="t-text" rows="4" placeholder="Erzähle vom Tag..."></textarea></div>
            <div class="form-group">
                <label>Fotos</label>
                <div class="d-flex gap-1 flex-wrap" id="t-foto-preview"></div>
                <button type="button" class="btn btn-outline btn-sm mt-1" onclick="captureTFoto()">
                    <svg class="icon"><use href="#icon-camera"/></svg> Foto aufnehmen
                </button>
            </div>
        </div>
        <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('modal-tagebuch')">Abbrechen</button><button class="btn btn-primary" onclick="saveTagebuch()">Speichern</button></div>
    </div>
</div>

<script>
let selectedStimmung = 3;
let tPendingFotos = [];
const stimmungLabels = {1:'Schwieriger Tag', 2:'Anstrengend', 3:'Normal', 4:'Schöner Tag', 5:'Wunderbar'};

function setStimmung(v) {
    selectedStimmung = v;
    document.querySelectorAll('#t-stimmung-btns .btn').forEach((b, i) => {
        b.classList.toggle('btn-primary', i + 1 === v);
        b.classList.toggle('btn-outline', i + 1 !== v);
    });
}

async function captureTFoto() {
    const blobs = await GlobalCamera.captureMultiple();
    if (!blobs || !blobs.length) return;
    tPendingFotos.push(...blobs);
    document.getElementById('t-foto-preview').innerHTML = tPendingFotos.map((blob, i) => {
        const url = URL.createObjectURL(blob);
        return `<img src="${url}" style="width:70px;height:70px;object-fit:cover;border-radius:6px;border:1px solid var(--border-color);">`;
    }).join('');
}

async function loadData() {
    if (!KIND_ID) return;
    const data = await api(`/tagebuch/api/list/${KIND_ID}`);
    const c = document.getElementById('tagebuch-list');
    if (!data.length) {
        c.innerHTML = '<p class="empty-text">Noch keine Einträge. Halte die schönsten Momente fest!</p>';
        return;
    }
    window._tagebuchDaten = data;
    c.innerHTML = data.map(e => {
        const fotoHtml = (e.fotos && e.fotos.length) ?
            `<div class="d-flex gap-1 flex-wrap mt-1">${e.fotos.map(f =>
                `<img src="/tagebuch/api/foto/${f.id}" style="width:100px;height:100px;object-fit:cover;border-radius:8px;border:1px solid var(--border-color);cursor:pointer;" onclick="openFotoBig('/tagebuch/api/foto/${f.id}')">`
            ).join('')}</div>` : '';

        return `<div class="card mb-2" style="border-left:3px solid var(--primary);">
            <div class="d-flex justify-between items-center">
                <div>
                    <span class="fw-bold">${formatDate(e.datum)}</span>
                    ${e.stimmung ? `<span class="badge badge-primary" style="margin-left:0.5rem;">${stimmungLabels[e.stimmung] || e.stimmung}</span>` : ''}
                </div>
                <div class="d-flex gap-1">
                    <button class="btn btn-outline btn-sm btn-icon" onclick="editT(${e.id})"><svg class="icon"><use href="#icon-edit"/></svg></button>
                    <button class="btn btn-outline btn-sm" onclick="uploadFotoZuTB(${e.id})"><svg class="icon"><use href="#icon-camera"/></svg></button>
                    <button class="btn btn-outline btn-sm btn-icon" onclick="delT(${e.id})"><svg class="icon"><use href="#icon-trash"/></svg></button>
                </div>
            </div>
            ${e.titel ? `<h3 class="mt-1">${esc(e.titel)}</h3>` : ''}
            ${e.text ? `<p class="text-sm" style="white-space:pre-wrap; margin:0.5rem 0 0;">${esc(e.text)}</p>` : ''}
            ${fotoHtml}
        </div>`;
    }).join('');
}

function editT(id) {
    const e = window._tagebuchDaten.find(x => x.id === id);
    if (!e) return;
    document.getElementById('t-id').value = e.id;
    document.getElementById('tb-modal-title').textContent = 'Eintrag bearbeiten';
    document.getElementById('t-datum').value = e.datum || '';
    document.getElementById('t-titel').value = e.titel || '';
    document.getElementById('t-text').value = e.text || '';
    setStimmung(e.stimmung || 3);
    openModal('modal-tagebuch');
}

async function saveTagebuch() {
    const id = document.getElementById('t-id').value;
    const body = {
        kind_id: KIND_ID,
        datum: document.getElementById('t-datum').value || new Date().toISOString().split('T')[0],
        titel: document.getElementById('t-titel').value,
        text: document.getElementById('t-text').value,
        stimmung: selectedStimmung,
    };
    try {
        let r;
        if (id) { await api(`/tagebuch/api/update/${id}`, {method:'PUT', body}); r = {id}; }
        else { r = await api('/tagebuch/api/create', {method:'POST', body}); }
        const csrfToken = document.querySelector('meta[name="csrf-token"]')?.content;
        for (let i = 0; i < tPendingFotos.length; i++) {
            const fd = new FormData();
            fd.append('foto', tPendingFotos[i], tPendingFotos[i].name || `foto_${i}.jpg`);
            const fHeaders = {};
            if (csrfToken) fHeaders['X-CSRFToken'] = csrfToken;
            const fResp = await fetch(`/tagebuch/api/${r.id}/foto`, {method: 'POST', body: fd, headers: fHeaders});
            if (!fResp.ok) {
                const fErr = await fResp.json().catch(() => ({}));
                throw new Error(fErr.error || 'Foto-Upload fehlgeschlagen');
            }
        }
        tPendingFotos = [];
        document.getElementById('t-id').value = '';
        document.getElementById('tb-modal-title').textContent = 'Tagebucheintrag';
        closeModal('modal-tagebuch');
        showToast('Gespeichert', 'success');
        loadData();
    } catch (e) { showToast(e.message, 'error'); }
}

async function uploadFotoZuTB(eintragId) {
    const blob = await GlobalCamera.capture();
    if (!blob) return;
    const fd = new FormData();
    fd.append('foto', blob, blob.name || 'foto.jpg');
    const fHeaders = {};
    const csrfToken = document.querySelector('meta[name="csrf-token"]')?.content;
    if (csrfToken) fHeaders['X-CSRFToken'] = csrfToken;
    const fResp = await fetch(`/tagebuch/api/${eintragId}/foto`, {method: 'POST', body: fd, headers: fHeaders});
    if (!fResp.ok) {
        const fErr = await fResp.json().catch(() => ({}));
        showToast(fErr.error || 'Foto-Upload fehlgeschlagen', 'error');
        return;
    }
    showToast('Foto gespeichert', 'success');
    loadData();
}

function openFotoBig(url) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay active';
    overlay.style.zIndex = '3000'; overlay.style.cursor = 'pointer';
    overlay.innerHTML = `<img src="${url}" style="max-width:90vw;max-height:90vh;border-radius:8px;box-shadow:0 10px 40px rgba(0,0,0,0.4);">`;
    overlay.onclick = () => overlay.remove();
    document.body.appendChild(overlay);
}

async function delT(id) {
    if (!await confirm('Eintrag mit allen Fotos löschen?', {danger: true})) return;
    await api(`/tagebuch/api/delete/${id}`, {method: 'DELETE'});
    showToast('Gelöscht', 'success');
    loadData();
}

document.getElementById('t-datum').value = new Date().toISOString().split('T')[0];
setStimmung(3);
loadData();
</script>
{% endblock %}
