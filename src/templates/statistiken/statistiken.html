{% extends "layout.html" %}
{% block content %}
<div class="page-header">
    <h1><svg class="icon"><use href="#icon-bar-chart"/></svg> Statistiken</h1>
</div>

<div class="tab-bar">
    <button class="tab-btn active" onclick="showSTab('tag',this)">Heute</button>
    <button class="tab-btn" onclick="showSTab('woche',this)">Woche</button>
</div>

<div id="stab-tag" class="tab-content active">
    <div class="stat-grid mb-2" id="tages-stats"></div>
    <div class="dashboard-grid" id="tages-detail"></div>
</div>

<div id="stab-woche" class="tab-content">
    <div id="wochen-charts"></div>
</div>

<script>
// KIND_ID kommt aus layout.html (global)

function showSTab(id, btn) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('stab-' + id).classList.add('active');
    btn.classList.add('active');
    if (id === 'woche') loadWoche();
}

function barChart(data, labelKey, valueKey, color, maxVal) {
    if (!maxVal) maxVal = Math.max(...data.map(d => d[valueKey]), 1);
    return `<div style="display:flex;gap:2px;align-items:flex-end;height:100px;padding:0 4px;">
        ${data.map(d => {
            const pct = (d[valueKey] / maxVal) * 100;
            return `<div style="flex:1;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;">
                <div style="font-size:0.7rem;font-weight:700;color:${color};margin-bottom:2px;">${d[valueKey]}</div>
                <div style="width:100%;max-width:32px;background:${color};height:${Math.max(pct, 2)}%;border-radius:4px 4px 0 0;transition:height 0.3s;"></div>
                <div style="font-size:0.65rem;color:#999;margin-top:4px;font-weight:600;">${d[labelKey]}</div>
            </div>`;
        }).join('')}
    </div>`;
}

async function loadData() {
    if (!KIND_ID) return;
    const d = await api(`/statistiken/api/tagesuebersicht/${KIND_ID}`);

    document.getElementById('tages-stats').innerHTML = `
        <div class="stat-card">
            <div class="stat-card-value" style="color:var(--primary);">${d.fuetterung.gesamt}</div>
            <div class="stat-card-label">Fütterungen</div>
        </div>
        <div class="stat-card">
            <div class="stat-card-value" style="color:var(--accent);">${d.schlaf.gesamt_minuten > 0 ? formatDauer(d.schlaf.gesamt_minuten) : '0'}</div>
            <div class="stat-card-label">Schlaf gesamt</div>
        </div>
        <div class="stat-card">
            <div class="stat-card-value" style="color:var(--info);">${d.windeln.gesamt}</div>
            <div class="stat-card-label">Windeln</div>
        </div>
    `;

    document.getElementById('tages-detail').innerHTML = `
        <div class="card">
            <h3>Fütterung</h3>
            <div class="stat-grid" style="grid-template-columns:1fr 1fr;">
                <div class="stat-card"><div class="stat-card-value">${d.fuetterung.stillen.count}</div><div class="stat-card-label">Stillen</div><div class="stat-card-sub">${d.fuetterung.stillen.dauer_minuten} Min.</div></div>
                <div class="stat-card"><div class="stat-card-value">${d.fuetterung.flasche.count}</div><div class="stat-card-label">Flasche</div><div class="stat-card-sub">${d.fuetterung.flasche.menge_ml} ml</div></div>
            </div>
        </div>
        <div class="card">
            <h3>Schlaf & Windeln</h3>
            <div class="stat-grid" style="grid-template-columns:1fr 1fr 1fr;">
                <div class="stat-card"><div class="stat-card-value" style="color:var(--accent);">${d.schlaf.nickerchen}</div><div class="stat-card-label">Nickerchen</div></div>
                <div class="stat-card"><div class="stat-card-value" style="color:var(--info);">${d.windeln.nass}</div><div class="stat-card-label">Nass</div></div>
                <div class="stat-card"><div class="stat-card-value" style="color:var(--warning);">${d.windeln.stuhl}</div><div class="stat-card-label">Stuhl</div></div>
            </div>
        </div>
    `;
}

async function loadWoche() {
    if (!KIND_ID) return;
    const data = await api(`/statistiken/api/wochenverlauf/${KIND_ID}`);

    document.getElementById('wochen-charts').innerHTML = `
        <div class="card mb-2">
            <h3>Fütterungen pro Tag</h3>
            ${barChart(data, 'wochentag', 'fuetterungen', 'var(--primary)')}
        </div>
        <div class="card mb-2">
            <h3>Schlaf pro Tag (Minuten)</h3>
            ${barChart(data, 'wochentag', 'schlaf_minuten', '#8b6e4e')}
        </div>
        <div class="card">
            <h3>Windeln pro Tag</h3>
            ${barChart(data, 'wochentag', 'windeln', '#5b7f8e')}
        </div>
    `;
}

loadData();
</script>
{% endblock %}
