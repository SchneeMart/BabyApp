<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passwort zurücksetzen - BabyApp</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}?v={{ cache_buster }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/buttons.css') }}?v={{ cache_buster }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/forms.css') }}?v={{ cache_buster }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/utilities.css') }}?v={{ cache_buster }}">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <h1>Passwort zurücksetzen</h1>
            <p class="text-muted mb-2">Gib deine E-Mail-Adresse ein</p>
            {% with messages = get_flashed_messages(with_categories=true) %}{% if messages %}{% for category, message in messages %}
            <div style="padding:0.5rem;background:#e3f2fd;color:#1565C0;border-radius:6px;font-size:0.85rem;margin-bottom:0.75rem;">{{ message }}</div>
            {% endfor %}{% endif %}{% endwith %}
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <input type="email" name="email" class="form-control" placeholder="E-Mail-Adresse" required>
                <button type="submit" class="btn btn-primary btn-block">Link senden</button>
            </form>
            <p class="text-muted text-sm mt-2"><a href="{{ url_for('auth.login') }}">Zurück zum Login</a></p>
        </div>
    </div>
</body>
</html>
