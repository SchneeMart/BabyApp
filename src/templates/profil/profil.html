{% extends "layout.html" %}
{% block content %}
<div class="page-header">
    <h1><svg class="icon"><use href="#icon-users"/></svg> Mein Profil</h1>
</div>

<!-- Profilübersicht -->
<div class="card mb-2" id="profil-info">
    <div class="d-flex items-center gap-2 mb-2">
        <div style="width:56px;height:56px;border-radius:50%;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:800;flex-shrink:0;" id="profil-avatar"></div>
        <div>
            <h2 style="margin:0;" id="profil-name"></h2>
            <div class="text-sm text-muted" id="profil-email"></div>
            <div class="mt-1"><span class="badge badge-primary" id="profil-rolle"></span></div>
        </div>
    </div>
    <div class="d-flex gap-2 flex-wrap text-sm text-muted">
        <span id="profil-login"></span>
        <span id="profil-erstellt"></span>
    </div>
</div>

<!-- Profil bearbeiten -->
<div class="card mb-2">
    <h3>Profil bearbeiten</h3>
    <div class="form-group">
        <label>Benutzername</label>
        <input type="text" class="form-control" id="p-username">
    </div>
    <div class="form-group">
        <label>E-Mail-Adresse</label>
        <input type="email" class="form-control" id="p-email">
    </div>
    <button class="btn btn-primary" onclick="saveProfil()">Profil speichern</button>
</div>

<!-- Passwort ändern -->
<div class="card">
    <h3>Passwort ändern</h3>
    <div class="form-group">
        <label>Aktuelles Passwort</label>
        <input type="password" class="form-control" id="pw-aktuell">
    </div>
    <div class="form-group">
        <label>Neues Passwort</label>
        <input type="password" class="form-control" id="pw-neu">
    </div>
    <div class="form-group">
        <label>Neues Passwort wiederholen</label>
        <input type="password" class="form-control" id="pw-neu2">
    </div>
    <button class="btn btn-primary" onclick="savePW()">Passwort ändern</button>
</div>

<script>
async function loadProfil() {
    const d = await api('/profil/api/me');
    document.getElementById('profil-avatar').textContent = (d.username || '?')[0].toUpperCase();
    document.getElementById('profil-name').textContent = d.username;
    document.getElementById('profil-email').textContent = d.email;
    document.getElementById('profil-rolle').textContent = d.rolle_label;
    document.getElementById('profil-login').textContent = d.last_login ? 'Letzter Login: ' + formatDateTime(d.last_login) : '';
    document.getElementById('profil-erstellt').textContent = d.created_at ? 'Registriert: ' + formatDate(d.created_at) : '';

    document.getElementById('p-username').value = d.username;
    document.getElementById('p-email').value = d.email;
}

async function saveProfil() {
    try {
        await api('/profil/api/update', {method: 'PUT', body: {
            username: document.getElementById('p-username').value,
            email: document.getElementById('p-email').value,
        }});
        showToast('Profil gespeichert', 'success');
        loadProfil();
    } catch (e) { showToast(e.message, 'error'); }
}

async function savePW() {
    try {
        await api('/profil/api/passwort', {method: 'POST', body: {
            aktuell: document.getElementById('pw-aktuell').value,
            neu: document.getElementById('pw-neu').value,
            neu2: document.getElementById('pw-neu2').value,
        }});
        showToast('Passwort geändert', 'success');
        document.getElementById('pw-aktuell').value = '';
        document.getElementById('pw-neu').value = '';
        document.getElementById('pw-neu2').value = '';
    } catch (e) { showToast(e.message, 'error'); }
}

loadProfil();
</script>
{% endblock %}
